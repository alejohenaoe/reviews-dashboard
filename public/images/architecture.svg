<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Guest Reviews Dashboard — Architecture</text>

  <!-- ══════════════════════════════════════════════
       ARROW MARKERS
  ══════════════════════════════════════════════ -->
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#94a3b8"/>
    </marker>
    <marker id="abl" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="agr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#10b981"/>
    </marker>
    <marker id="apu" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="aam" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#d97706"/>
    </marker>
    <marker id="are" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════
       DATA PIPELINE — top center
  ══════════════════════════════════════════════ -->

  <!-- CSV -->
  <rect x="390" y="50" width="220" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">📄 guest_reviews.csv</text>
  <text x="500" y="90" text-anchor="middle" font-size="10" fill="#1d4ed8">25 columns · public/data/</text>

  <!-- Arrow CSV → parse -->
  <line x1="500" y1="102" x2="500" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#ag)"/>
  <text x="510" y="120" font-size="10" fill="#64748b">papaparse</text>

  <!-- loadReviews + normalize -->
  <rect x="360" y="132" width="280" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">loadReviews.js  ·  normalize.js</text>
  <text x="500" y="171" text-anchor="middle" font-size="10" fill="#1d4ed8">parse dates · handle nulls · absent ≠ zero</text>

  <!-- Arrow parse → context -->
  <line x1="500" y1="184" x2="500" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ReviewsContext -->
  <rect x="345" y="214" width="310" height="52" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">ReviewsContext</text>
  <text x="500" y="255" text-anchor="middle" font-size="10" fill="#4338ca">global state: reviews[], active filters, dispatch</text>

  <!-- Branch arrows FROM ReviewsContext -->
  <!-- to Metrics (left) -->
  <path d="M 370 266 Q 200 290 165 316" stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#ag)"/>
  <!-- to Pages (down) -->
  <line x1="500" y1="266" x2="500" y2="316" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ag)"/>


  <!-- ══════════════════════════════════════════════
       PURE JS METRICS — left column
  ══════════════════════════════════════════════ -->

  <!-- Group background -->
  <rect x="22" y="320" width="240" height="305" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="142" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Pure JS Metrics — no AI</text>

  <rect x="38" y="350" width="208" height="34" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="372" text-anchor="middle" font-size="12" fill="#065f46">portfolioStats</text>

  <rect x="38" y="394" width="208" height="34" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="416" text-anchor="middle" font-size="12" fill="#065f46">propertySummary</text>

  <rect x="38" y="438" width="208" height="34" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="460" text-anchor="middle" font-size="12" fill="#065f46">riskLevel + priorityScore</text>

  <rect x="38" y="482" width="208" height="34" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="504" text-anchor="middle" font-size="12" fill="#065f46">monthlyTrend</text>

  <rect x="38" y="526" width="208" height="34" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="548" text-anchor="middle" font-size="12" fill="#065f46">aggregateThemes</text>

  <!-- Metrics → Pages -->
  <line x1="262" y1="472" x2="332" y2="472" stroke="#10b981" stroke-width="1.8" marker-end="url(#agr)"/>


  <!-- ══════════════════════════════════════════════
       PAGES — center column
  ══════════════════════════════════════════════ -->

  <!-- Group background -->
  <rect x="332" y="320" width="244" height="225" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="454" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Pages</text>

  <rect x="348" y="350" width="212" height="34" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="454" y="372" text-anchor="middle" font-size="12" fill="#5b21b6">PortfolioOverview</text>

  <rect x="348" y="394" width="212" height="34" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="454" y="416" text-anchor="middle" font-size="12" fill="#5b21b6">Properties</text>

  <rect x="348" y="438" width="212" height="34" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="454" y="460" text-anchor="middle" font-size="12" fill="#5b21b6">PropertyDetail</text>

  <rect x="348" y="482" width="212" height="34" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="454" y="504" text-anchor="middle" font-size="12" fill="#5b21b6">UnansweredQueue</text>

  <!-- ThemesContext below Pages -->
  <rect x="348" y="600" width="212" height="46" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="454" y="620" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">ThemesContext</text>
  <text x="454" y="637" text-anchor="middle" font-size="10" fill="#7c3aed">per-property extraction cache</text>

  <!-- ThemesContext → Pages (up) -->
  <line x1="454" y1="600" x2="454" y2="556" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#apu)"/>


  <!-- ══════════════════════════════════════════════
       AI LAYER — right column
  ══════════════════════════════════════════════ -->

  <!-- Group background -->
  <rect x="620" y="320" width="458" height="390" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="849" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">On-demand AI Layer</text>

  <!-- ── AI Features (left sub-column) ── -->

  <!-- Theme Extraction -->
  <rect x="636" y="352" width="185" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="728" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Theme Extraction</text>
  <text x="728" y="390" text-anchor="middle" font-size="10" fill="#78350f">extractThemesBatch.js</text>
  <text x="728" y="403" text-anchor="middle" font-size="10" fill="#78350f">group by lang · Promise.allSettled</text>

  <!-- Vibe Score -->
  <rect x="636" y="428" width="185" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="728" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Vibe Score</text>
  <text x="728" y="466" text-anchor="middle" font-size="10" fill="#78350f">per review · 1–5 scale</text>
  <text x="728" y="479" text-anchor="middle" font-size="10" fill="#78350f">mismatch detection</text>

  <!-- Draft Response -->
  <rect x="636" y="504" width="185" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="728" y="526" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Draft Response</text>
  <text x="728" y="542" text-anchor="middle" font-size="10" fill="#78350f">same language as review</text>
  <text x="728" y="555" text-anchor="middle" font-size="10" fill="#78350f">read-only · clipboard copy</text>

  <!-- ── claudeClient.js / Claude API ── -->
  <rect x="636" y="640" width="425" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="848" y="662" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">☁  Claude Sonnet 4.6  (Anthropic API)</text>
  <text x="848" y="681" text-anchor="middle" font-size="10" fill="#b91c1c">claudeClient.js · MAX_TOKENS = 4096 · dangerouslyAllowBrowser</text>

  <!-- AI features → Claude (vertical dashed) -->
  <line x1="728" y1="410" x2="728" y2="640" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#are)"/>
  <line x1="728" y1="486" x2="728" y2="640" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="728" y1="562" x2="728" y2="640" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ── Validators (right sub-column) ── -->

  <!-- validateThemes -->
  <rect x="850" y="352" width="212" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="956" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">validateThemes.js</text>
  <text x="956" y="390" text-anchor="middle" font-size="10" fill="#78350f">structural · type · silent drop</text>
  <text x="956" y="403" text-anchor="middle" font-size="10" fill="#78350f">malformed themes</text>

  <!-- validateVibeScore -->
  <rect x="850" y="428" width="212" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="956" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">validateVibeScore.js</text>
  <text x="956" y="466" text-anchor="middle" font-size="10" fill="#78350f">range check: integer 1–5</text>
  <text x="956" y="479" text-anchor="middle" font-size="10" fill="#78350f">throws on invalid response</text>

  <!-- Feature → Validator arrows (horizontal) -->
  <line x1="821" y1="381" x2="850" y2="381" stroke="#d97706" stroke-width="1.5" marker-end="url(#aam)"/>
  <line x1="821" y1="457" x2="850" y2="457" stroke="#d97706" stroke-width="1.5" marker-end="url(#aam)"/>

  <!-- validateThemes → ThemesContext (path out of AI group, down-left) -->
  <path d="M 956 410 Q 956 580 560 613" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#apu)"/>

  <!-- validateThemes → aggregateThemes in Metrics -->
  <path d="M 850 390 Q 500 565 246 543" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#agr)"/>

  <!-- Pages → AI features (on-demand triggers, dashed amber) -->
  <line x1="576" y1="371" x2="636" y2="381" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#aam)"/>
  <line x1="576" y1="452" x2="636" y2="457" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#aam)"/>
  <line x1="576" y1="490" x2="636" y2="533" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#aam)"/>

  <!-- On-demand labels -->
  <text x="593" y="368" font-size="9" fill="#92400e">Analyze</text>
  <text x="593" y="449" font-size="9" fill="#92400e">Vibe</text>
  <text x="593" y="488" font-size="9" fill="#92400e">Draft</text>


  <!-- ══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════ -->
  <rect x="22" y="728" width="1056" height="75" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="550" y="748" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Legend</text>

  <rect x="38" y="757" width="12" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="56" y="768" font-size="10" fill="#475569">Data pipeline</text>

  <rect x="148" y="757" width="12" height="12" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="166" y="768" font-size="10" fill="#475569">Global context</text>

  <rect x="266" y="757" width="12" height="12" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="284" y="768" font-size="10" fill="#475569">Pure JS / deterministic</text>

  <rect x="406" y="757" width="12" height="12" rx="3" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="424" y="768" font-size="10" fill="#475569">UI pages</text>

  <rect x="490" y="757" width="12" height="12" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="508" y="768" font-size="10" fill="#475569">AI layer (on-demand)</text>

  <rect x="638" y="757" width="12" height="12" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="656" y="768" font-size="10" fill="#475569">External API</text>

  <line x1="736" y1="763" x2="768" y2="763" stroke="#94a3b8" stroke-width="2"/>
  <text x="774" y="768" font-size="10" fill="#475569">data flow</text>

  <line x1="856" y1="763" x2="888" y2="763" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="894" y="768" font-size="10" fill="#475569">async / validated</text>

  <text x="550" y="793" text-anchor="middle" font-size="10" fill="#94a3b8">React 19 · Vite 8 · Tailwind CSS v4 · react-router-dom v7 · papaparse · recharts · @anthropic-ai/sdk · vitest 3</text>
</svg>
